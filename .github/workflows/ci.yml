name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  testes-cobertura-build-sonar:
    name: Testes, cobertura, build e qualidade
    runs-on: ubuntu-latest

    steps:
      - name: 1. Baixar código do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 3. Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Executar testes automatizados
        run: pytest -v

      - name: 5. Gerar estatísticas de cobertura
        run: |
          coverage run -m pytest
          coverage xml
          coverage report

      - name: 6. Gerar build Docker
        run: docker build -t despesas-receitas-ci .

      - name: 7. Executar análise de qualidade com SonarCloud
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}