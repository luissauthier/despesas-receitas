<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; color: #111827; }
      .container { max-width: 420px; margin: 48px auto; }
      h1 { font-size: 20px; margin: 0 0 6px; }
      .meta { color: #6b7280; font-size: 13px; margin-bottom: 16px; }
      .card { border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; }
      label { display: block; font-size: 12px; color: #374151; text-transform: uppercase; letter-spacing: .04em; margin: 12px 0 6px; }
      input { width: 100%; padding: 10px 12px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 14px; }
      button { margin-top: 14px; width: 100%; padding: 10px 12px; border: 0; border-radius: 10px; background: #111827; color: white; font-weight: 600; cursor: pointer; }
      .error { margin-top: 12px; padding: 10px 12px; border-radius: 10px; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; font-size: 13px; }
      .hint { margin-top: 10px; color: #6b7280; font-size: 12px; }
      code { background: #f3f4f6; padding: 1px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Entrar</h1>
      <div class="meta">Acesse para ver a listagem de lançamentos.</div>

      <div class="card">
        <form method="post" action="{{ url_for('login_post') }}">
          <input type="hidden" name="next" value="{{ next_url }}" />

          <label for="login">Login</label>
          <input id="login" name="login" autocomplete="username" required />

          <label for="senha">Senha</label>
          <input id="senha" name="senha" type="password" autocomplete="current-password" required />

          <button type="submit">Entrar</button>

          {% if error %}
            <div class="error">{{ error }}</div>
          {% endif %}

          <div class="hint">
            Seed padrão: <code>admin</code> / <code>admin123</code>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
