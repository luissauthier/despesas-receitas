{% extends "base.html" %}

{% block title %}Login{% endblock %}
{% block header_title %}Entrar{% endblock %}
{% block header_meta %}Acesse para gerenciar lançamentos{% endblock %}

{% block content %}
  <div class="card" style="max-width: 520px; margin: 16px auto 0">
    <div class="card-body">
      <form method="post" action="{{ url_for('login_post') }}">
        <input type="hidden" name="next" value="{{ next_url }}" />

        <label for="login">Login</label>
        <input id="login" name="login" autocomplete="username" required />

        <label for="senha">Senha</label>
        <input id="senha" name="senha" type="password" autocomplete="current-password" required />

        <div class="actions">
          <button class="btn primary" type="submit">Entrar</button>
        </div>

        {% if error %}
          <div class="flash error" style="margin-top: 14px">{{ error }}</div>
        {% endif %}

      </form>
    </div>
  </div>
{% endblock %}
